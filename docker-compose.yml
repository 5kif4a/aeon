services:
  app:
    build: .
    container_name: aeon-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment: &app-env
      DATABASE_URL: "postgresql+asyncpg://aeon:aeon@postgres:5432/aeon"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_AGENT_HISTORY_TTL: "${REDIS_AGENT_HISTORY_TTL:-2592000}"
      BOT_TOKEN: "${BOT_TOKEN:-}"
      BOT_USERNAME: "${BOT_USERNAME:-}"
      BOT_MODE: "${BOT_MODE:-polling}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      MINI_APP_URL: "${MINI_APP_URL:-}"
      WEBHOOK_BASE_URL: "${WEBHOOK_BASE_URL:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      GEMINI_MAX_OUTPUT_TOKENS: "${GEMINI_MAX_OUTPUT_TOKENS:-2500}"
      REMINDER_HOUR: "${REMINDER_HOUR:-9}"
      REMINDER_TZ: "${REMINDER_TZ:-UTC}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  migrate:
    build: .
    container_name: aeon-migrate
    command: ["alembic", "upgrade", "head"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aeon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aeon
      POSTGRES_PASSWORD: aeon
      POSTGRES_DB: aeon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeon -d aeon"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aeon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  redis_data:
